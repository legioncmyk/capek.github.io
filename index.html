<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZALLSTORE | Digital Marketplace - Premium Akun & Jasa Kreatif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 100%);
            color: #FFFFFF;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .logo i {
            background: linear-gradient(135deg, #FF6B35, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.8rem;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #E0E0E0;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-link i {
            font-size: 1.2rem;
        }

        .nav-link:hover {
            color: #FF6B35;
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .nav-link.active {
            color: #FF6B35;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(255, 107, 53, 0.05));
        }

        .nav-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
        }

        /* Main Content */
        main {
            margin-top: 80px;
            min-height: calc(100vh - 160px);
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Footer */
        .footer {
            background: rgba(15, 15, 26, 0.95);
            border-top: 1px solid rgba(255, 107, 53, 0.2);
            padding: 2rem;
            margin-top: 4rem;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
        }

        .social-links a {
            color: #E0E0E0;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: #FF6B35;
            transform: translateY(-3px);
        }

        /* Buttons */
        .btn-primary, .btn-secondary {
            padding: 0.875rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B35, #E55A2C);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #FF6B35;
            border: 1px solid #FF6B35;
        }

        .btn-secondary:hover {
            background: #FF6B35;
            color: white;
            transform: translateY(-3px);
        }

        /* Cards & Grid */
        .products-grid, .jasa-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card, .jasa-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .product-card:hover, .jasa-card:hover {
            transform: translateY(-5px);
            border-color: #FF6B35;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.15);
        }

        .product-card h3, .jasa-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
            color: #FF6B35;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 800;
            color: #FF6B35;
            margin: 0.75rem 0;
        }

        .status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin: 0.5rem 0;
        }

        .status.tersedia {
            background: rgba(39, 174, 96, 0.2);
            color: #27AE60;
        }

        .status.habis {
            background: rgba(231, 76, 60, 0.2);
            color: #E74C3C;
        }

        /* Hero Section */
        .hero-section {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.05), transparent);
            border-radius: 40px;
            margin-bottom: 3rem;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #FF6B35, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-description {
            font-size: 1.1rem;
            color: #E0E0E0;
            max-width: 700px;
            margin: 0 auto 2rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
        }

        .feature-card i {
            font-size: 2.5rem;
            color: #FF6B35;
            margin-bottom: 1rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1A1A2E, #0F0F1A);
            border: 1px solid #FF6B35;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .dana-number {
            background: linear-gradient(135deg, #FF6B35, #E55A2C);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            margin: 1rem 0;
        }

        .modal-footer {
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 107, 53, 0.2);
        }

        /* Admin Panel */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .add-product-form {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .add-product-form input, .add-product-form select {
            padding: 0.75rem;
            margin: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 12px;
            color: white;
        }

        /* Dashboard */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 30px;
            padding: 2.5rem;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            outline: none;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .section-title {
            font-size: 1.5rem;
            margin: 2rem 0 1rem;
            color: #FF6B35;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }

        .toast.success { background: #27AE60; }
        .toast.error { background: #E74C3C; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-menu {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                background: rgba(26, 26, 46, 0.98);
                flex-direction: column;
                padding: 2rem;
                transition: left 0.3s ease;
            }
            .nav-menu.active { left: 0; }
            .nav-toggle { display: block; }
            .hero-title { font-size: 2rem; }
            main { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo" onclick="navigateTo('home')">
                    <i class="fas fa-store"></i>
                    <span>ZALLSTORE</span>
                </div>
                <div class="nav-menu" id="navMenu">
                    <a class="nav-link" onclick="navigateTo('home')"><i class="fas fa-home"></i><span>Home</span></a>
                    <a class="nav-link" onclick="navigateTo('premium')"><i class="fas fa-gem"></i><span>Premium</span></a>
                    <a class="nav-link" onclick="navigateTo('jasa')"><i class="fas fa-camera"></i><span>Jasa</span></a>
                    <a class="nav-link" onclick="navigateTo('dashboard')"><i class="fas fa-user"></i><span>Dashboard</span></a>
                    <a class="nav-link" onclick="navigateTo('admin')"><i class="fas fa-shield-alt"></i><span>Admin</span></a>
                </div>
                <div class="nav-toggle" onclick="document.getElementById('navMenu').classList.toggle('active')">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </nav>

        <main id="page-content"></main>

        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2024 ZALLSTORE Digital Hub | Marketplace Akun Premium & Jasa Kreatif</p>
                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-tiktok"></i></a>
                    <a href="#"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-cart"></i> Konfirmasi Order</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="modal-product-detail"></div>
                <div class="payment-info">
                    <p>Pembayaran via <strong>DANA</strong> ke nomor:</p>
                    <div class="dana-number">08516930771</div>
                    <p class="note">Setelah transfer, kirim bukti ke WhatsApp admin</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Batal</button>
                <button class="btn-primary" id="confirm-order-btn">Order via WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        const productsData = [
            { id: 1, name: "CapCut Pro 1 Bulan", price: 25000, stock: 10, status: "tersedia", category: "capcut" },
            { id: 2, name: "Canva Pro 1 Tahun", price: 75000, stock: 5, status: "tersedia", category: "canva" },
            { id: 3, name: "Spotify Premium 3 Bulan", price: 45000, stock: 8, status: "tersedia", category: "spotify" },
            { id: 4, name: "Netflix Premium 1 Bulan", price: 35000, stock: 0, status: "habis", category: "netflix" },
            { id: 5, name: "CapCut Pro 3 Bulan", price: 65000, stock: 7, status: "tersedia", category: "capcut" },
            { id: 6, name: "Canva Pro 6 Bulan", price: 45000, stock: 12, status: "tersedia", category: "canva" }
        ];

        const jasaData = [
            { id: 1, name: "Editing Video Cinematic", price: 250000, duration: "2-3 hari", description: "Edit video profesional dengan efek cinematic", category: "edit" },
            { id: 2, name: "Fotografi Produk", price: 150000, duration: "1 hari", description: "Foto produk berkualitas tinggi untuk e-commerce", category: "photo" },
            { id: 3, name: "Video Company Profile", price: 500000, duration: "3-5 hari", description: "Video profil perusahaan dengan konsep modern", category: "video" },
            { id: 4, name: "Editing Wedding Video", price: 350000, duration: "2-3 hari", description: "Edit video pernikahan dengan musik dan efek", category: "edit" },
            { id: 5, name: "Foto Prewedding", price: 450000, duration: "1 hari", description: "Sesi foto prewedding dengan lokasi pilihan", category: "photo" }
        ];

        let currentProduct = null;

        // ==================== HELPER FUNCTIONS ====================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function sendToWhatsApp(productName, price) {
            const message = `Halo admin, saya ingin memesan:\n\nProduk: ${productName}\nHarga: Rp ${price.toLocaleString()}\n\nSaya akan melakukan pembayaran terlebih dahulu melalui DANA ke nomor: 08516930771\n\nSetelah transfer, saya akan mengirim bukti pembayaran ke nomor ini.`;
            window.open(`https://wa.me/6285169307731?text=${encodeURIComponent(message)}`, '_blank');
        }

        function openModal(product) {
            currentProduct = product;
            const modal = document.getElementById('order-modal');
            const detailDiv = document.getElementById('modal-product-detail');
            detailDiv.innerHTML = `
                <div style="background:rgba(255,255,255,0.05); padding:1rem; border-radius:16px">
                    <p><strong>Produk:</strong> ${product.name}</p>
                    <p><strong>Harga:</strong> Rp ${product.price.toLocaleString()}</p>
                    <p><strong>Status:</strong> ${product.status === 'tersedia' ? '✓ Tersedia' : '✗ Habis'}</p>
                </div>
            `;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('order-modal').classList.remove('show');
            currentProduct = null;
        }

        // ==================== PAGE RENDERERS ====================
        function renderHome() {
            return `
                <div class="hero-section">
                    <h1 class="hero-title">Jual Beli <span class="gradient-text">Akun Premium</span><br>& Jasa Kreatif <span class="gradient-text">Terpercaya</span></h1>
                    <p class="hero-description">Platform terbaik untuk membeli akun premium seperti CapCut Pro, Canva Pro, Spotify, Netflix, serta jasa videografi dan fotografi profesional. Harga termurah, proses cepat, dan aman!</p>
                    <div class="hero-buttons">
                        <button class="btn-primary" onclick="navigateTo('premium')"><i class="fas fa-shopping-cart"></i> Beli Sekarang</button>
                        <button class="btn-secondary" onclick="navigateTo('jasa')"><i class="fas fa-play"></i> Lihat Jasa</button>
                    </div>
                </div>

                <div class="features-grid">
                    <div class="feature-card"><i class="fas fa-tag"></i><h3>Harga Termurah</h3><p>Harga bersaing dengan kualitas terbaik</p></div>
                    <div class="feature-card"><i class="fas fa-bolt"></i><h3>Proses Cepat</h3><p>Akun langsung dikirim dalam hitungan menit</p></div>
                    <div class="feature-card"><i class="fas fa-shield-alt"></i><h3>100% Garansi</h3><p>Garansi refund jika ada masalah</p></div>
                    <div class="feature-card"><i class="fas fa-headset"></i><h3>Support 24/7</h3><p>Tim support siap membantu kapan saja</p></div>
                </div>

                <div class="section-title"><i class="fas fa-fire"></i> Best Seller Products</div>
                <div class="products-grid">
                    ${productsData.slice(0, 4).map(p => `
                        <div class="product-card">
                            <h3>${p.name}</h3>
                            <div class="price">Rp ${p.price.toLocaleString()}</div>
                            <div class="status ${p.status}">${p.status === 'tersedia' ? '✓ Tersedia' : '✗ Habis'}</div>
                            <button class="btn-primary" onclick="openModal(${JSON.stringify(p).replace(/"/g, '&quot;')})" ${p.status === 'habis' ? 'disabled style="opacity:0.5"' : ''}>
                                <i class="fas fa-shopping-cart"></i> Order Sekarang
                            </button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderPremium() {
            return `
                <div style="margin-bottom: 2rem;">
                    <h1 style="font-size: 2rem;"><i class="fas fa-gem"></i> Akun Premium Digital</h1>
                    <p>Dapatkan akses premium dengan harga terjangkau</p>
                </div>
                <div class="products-grid">
                    ${productsData.map(p => `
                        <div class="product-card">
                            <h3>${p.name}</h3>
                            <div class="price">Rp ${p.price.toLocaleString()}</div>
                            <div>Stok: ${p.stock}</div>
                            <div class="status ${p.status}">${p.status === 'tersedia' ? '✓ Tersedia' : '✗ Habis'}</div>
                            <button class="btn-primary" onclick="openModal(${JSON.stringify(p).replace(/"/g, '&quot;')})" ${p.status === 'habis' ? 'disabled style="opacity:0.5"' : ''}>
                                <i class="fas fa-shopping-cart"></i> Order Sekarang
                            </button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderJasa() {
            return `
                <div style="margin-bottom: 2rem;">
                    <h1 style="font-size: 2rem;"><i class="fas fa-camera-retro"></i> Jasa Videografi & Fotografi</h1>
                    <p>Kualitas profesional, hasil memukau</p>
                </div>
                <div class="jasa-grid">
                    ${jasaData.map(j => `
                        <div class="jasa-card">
                            <h3>${j.name}</h3>
                            <div class="price">Rp ${j.price.toLocaleString()}</div>
                            <div>Estimasi: ${j.duration}</div>
                            <p style="margin: 0.5rem 0; color: #aaa;">${j.description}</p>
                            <button class="btn-primary" onclick="sendToWhatsApp('${j.name}', ${j.price})">
                                <i class="fab fa-whatsapp"></i> Pesan via WhatsApp
                            </button>
                        </div>
                    `).join('')}
                </div>
                <div class="features-grid" style="margin-top: 3rem;">
                    <div class="feature-card"><i class="fas fa-video"></i><h3>Video Cinematic</h3><p>Hasil profesional seperti film</p></div>
                    <div class="feature-card"><i class="fas fa-camera"></i><h3>Foto Produk</h3><p>Meningkatkan nilai jual produk</p></div>
                    <div class="feature-card"><i class="fas fa-edit"></i><h3>Editing Expert</h3><p>Tim editor berpengalaman</p></div>
                </div>
            `;
        }

        function renderDashboard() {
            const loggedUser = localStorage.getItem('loggedUser');
            if (!loggedUser) {
                return `
                    <div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
                        <div class="login-card">
                            <div><i class="fas fa-user-circle" style="font-size: 4rem; color: #FF6B35;"></i></div>
                            <h2>Welcome Back!</h2>
                            <p>Login untuk mengakses dashboard</p>
                            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="login-username" placeholder="Username"></div>
                            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="login-password" placeholder="Password"></div>
                            <button class="btn-primary" onclick="userLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
                            <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
                                <button class="btn-secondary" onclick="document.getElementById('login-username').value='user1';document.getElementById('login-password').value='pass123'">Demo User 1</button>
                                <button class="btn-secondary" onclick="document.getElementById('login-username').value='user2';document.getElementById('login-password').value='pass123'">Demo User 2</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            const user = JSON.parse(loggedUser);
            return `
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
                    <div><h2><i class="fas fa-smile-wink"></i> Halo, ${user.username}!</h2><p>Selamat datang di dashboard ZALLSTORE</p></div>
                    <button class="btn-secondary" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
                <div class="dashboard-stats">
                    <div class="feature-card"><i class="fas fa-shopping-cart"></i><h3>${user.orders || 0}</h3><p>Total Pesanan</p></div>
                    <div class="feature-card"><i class="fas fa-gem"></i><h3>Rp ${(user.spent || 0).toLocaleString()}</h3><p>Total Belanja</p></div>
                    <div class="feature-card"><i class="fas fa-calendar"></i><h3>${user.member || 'Jan 2024'}</h3><p>Member Since</p></div>
                </div>
                <div class="feature-card" style="margin-bottom: 1rem;"><i class="fas fa-user"></i> <strong>Email:</strong> ${user.email || 'user@example.com'}</div>
                <div class="feature-card"><i class="fas fa-history"></i> <strong>Riwayat Pesanan</strong><p>Belum ada pesanan</p></div>
            `;
        }

        function renderAdmin() {
            const isAdmin = localStorage.getItem('isAdmin');
            if (!isAdmin) {
                return `
                    <div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
                        <div class="login-card">
                            <div><i class="fas fa-shield-alt" style="font-size: 4rem; color: #FF6B35;"></i></div>
                            <h2>Admin Access</h2>
                            <p>Masuk ke panel administrator</p>
                            <div class="input-group"><i class="fas fa-user-shield"></i><input type="text" id="admin-username" placeholder="Admin Username"></div>
                            <div class="input-group"><i class="fas fa-key"></i><input type="password" id="admin-password" placeholder="Password"></div>
                            <button class="btn-primary" onclick="adminLogin()"><i class="fas fa-sign-in-alt"></i> Login as Admin</button>
                            <div style="margin-top: 1rem; text-align: center; color: #888;">Demo: admin / admin123</div>
                        </div>
                    </div>
                `;
            }
            return `
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
                    <div><h1><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1><p>Kelola produk, pesanan, dan pengguna</p></div>
                    <button class="btn-secondary" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
                <div class="admin-stats">
                    <div class="feature-card"><i class="fas fa-boxes"></i><h3 id="total-products">${productsData.length}</h3><p>Total Produk</p></div>
                    <div class="feature-card"><i class="fas fa-users"></i><h3>156</h3><p>Total Pengguna</p></div>
                    <div class="feature-card"><i class="fas fa-chart-line"></i><h3>Rp 4.2Jt</h3><p>Pendapatan</p></div>
                </div>
                <div class="add-product-form">
                    <h3><i class="fas fa-plus-circle"></i> Tambah Produk Baru</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem;">
                        <input type="text" id="new-name" placeholder="Nama Produk">
                        <input type="number" id="new-price" placeholder="Harga">
                        <input type="number" id="new-stock" placeholder="Stok">
                        <select id="new-status"><option value="tersedia">Tersedia</option><option value="habis">Habis</option></select>
                        <button class="btn-primary" onclick="addNewProduct()"><i class="fas fa-save"></i> Tambah</button>
                    </div>
                </div>
                <div class="section-title"><i class="fas fa-edit"></i> Manajemen Produk</div>
                <div class="products-grid" id="admin-products-list">
                    ${productsData.map(p => `
                        <div class="product-card">
                            <h3>${p.name}</h3>
                            <div class="price">Rp ${p.price.toLocaleString()}</div>
                            <div>Stok: ${p.stock}</div>
                            <div class="status ${p.status}">${p.status === 'tersedia' ? '✓ Tersedia' : '✗ Habis'}</div>
                            <div class="product-actions" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                                <button class="btn-secondary" onclick="editProduct(${p.id})" style="flex:1; padding:0.5rem;"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn-secondary" onclick="deleteProduct(${p.id})" style="flex:1; padding:0.5rem; background:#E74C3C20; color:#E74C3C;"><i class="fas fa-trash"></i> Hapus</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== AUTH FUNCTIONS ====================
        window.userLogin = function() {
            const username = document.getElementById('login-username')?.value;
            const password = document.getElementById('login-password')?.value;
            if (username && password) {
                const user = { username, password: 'pass123', email: `${username}@email.com`, member: 'Jan 2024', orders: 2, spent: 120000 };
                localStorage.setItem('loggedUser', JSON.stringify(user));
                showToast('Login berhasil!');
                navigateTo('dashboard');
            } else {
                showToast('Masukkan username dan password!', 'error');
            }
        };

        window.logoutUser = function() {
            localStorage.removeItem('loggedUser');
            showToast('Logout berhasil');
            navigateTo('dashboard');
        };

        window.adminLogin = function() {
            const username = document.getElementById('admin-username')?.value;
            const password = document.getElementById('admin-password')?.value;
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('isAdmin', 'true');
                showToast('Admin login berhasil!');
                navigateTo('admin');
            } else {
                showToast('Login gagal! Username atau password salah', 'error');
            }
        };

        window.adminLogout = function() {
            localStorage.removeItem('isAdmin');
            showToast('Logout berhasil');
            navigateTo('admin');
        };

        // ==================== CRUD FUNCTIONS ====================
        window.addNewProduct = function() {
            const name = document.getElementById('new-name')?.value;
            const price = parseInt(document.getElementById('new-price')?.value);
            const stock = parseInt(document.getElementById('new-stock')?.value);
            const status = document.getElementById('new-status')?.value;
            if (name && price && stock) {
                productsData.push({ id: Date.now(), name, price, stock, status, category: 'general' });
                showToast('Produk berhasil ditambahkan!');
                navigateTo('admin');
            } else {
                showToast('Mohon isi semua field!', 'error');
            }
        };

        window.editProduct = function(id) {
            const product = productsData.find(p => p.id === id);
            if (product) {
                const newName = prompt('Edit nama produk:', product.name);
                const newPrice = parseInt(prompt('Edit harga:', product.price));
                const newStock = parseInt(prompt('Edit stok:', product.stock));
                if (newName && newPrice && newStock) {
                    product.name = newName;
                    product.price = newPrice;
                    product.stock = newStock;
                    showToast('Produk berhasil diupdate!');
                    navigateTo('admin');
                }
            }
        };

        window.deleteProduct = function(id) {
            if (confirm('Yakin ingin menghapus produk ini?')) {
                const index = productsData.findIndex(p => p.id === id);
                if (index !== -1) productsData.splice(index, 1);
                showToast('Produk berhasil dihapus!');
                navigateTo('admin');
            }
        };

        // ==================== NAVIGATION ====================
        window.navigateTo = function(page) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = Array.from(document.querySelectorAll('.nav-link')).find(l => l.innerText.toLowerCase().includes(page));
            if (activeLink) activeLink.classList.add('active');
            
            const content = document.getElementById('page-content');
            if (page === 'home') content.innerHTML = renderHome();
            else if (page === 'premium') content.innerHTML = renderPremium();
            else if (page === 'jasa') content.innerHTML = renderJasa();
            else if (page === 'dashboard') content.innerHTML = renderDashboard();
            else if (page === 'admin') content.innerHTML = renderAdmin();
            
            document.getElementById('navMenu')?.classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // ==================== INITIALIZE ====================
        document.getElementById('confirm-order-btn').onclick = () => {
            if (currentProduct) {
                sendToWhatsApp(currentProduct.name, currentProduct.price);
                closeModal();
            }
        };
        
        navigateTo('home');
    </script>
</body>
</html>
